<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Captura - Pescador</title>

    <style>

        *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: 'Inter', sans-serif;
        }


        body{
        background-color:white;
        display:flex;
        justify-content:center;
        align-items:center;
        min-height:100vh;
        padding:20px;
        }


        .container{
        display:flex;
        max-width:1100px;
        width:100%;
        background-color:#1351B4;
        border:6px solid #083D77;

        border-radius:18px;
        box-shadow:0 15px 40px rgba(0,0,0,0.25);
        overflow:hidden;
        }


        .info-section{
        flex:1;
        background-color:#083D77;
        color:white;
        padding:40px;
        display:flex;
        flex-direction:column;
        justify-content:center;
        border-right:4px solid #0B3A8A;
        }

        .info-section h1{
        font-size:2.2rem;
        margin-bottom:20px;
        color:white;
        letter-spacing:1px;
        }

        .fish-icon{
        text-align:center;
        margin:20px 0;
        font-size:4rem;
        }

        .brand{
        text-align:center;
        margin-top:30px;
        padding-top:20px;
        border-top:2px solid #2f5fb8;
        }

        .brand h2{
        color:white;
        font-size:1.8rem;
        letter-spacing:2px;
        }

        .form-section{
        flex:1;
        padding:40px;
        background-color:#f4f6fa;
        }

        .form-title{
        text-align:center;
        margin-bottom:30px;
        color:#083D77;
        font-size:1.8rem;
        }

        label{
        color:#083D77;
        font-weight:600;
        font-size:1.05rem;
        display:block;
        margin:12px 0 8px;
        }


        input,select,textarea{
        width:100%;
        padding:12px;
        border:2px solid #1351B4;
        background-color:white;
        color:#333;
        font-size:1rem;
        margin-bottom:12px;
        border-radius:8px;
        transition:0.2s;
        }

        input:focus,select:focus,textarea:focus{
        outline:none;
        border-color:#0B3A8A;
        box-shadow:0 0 6px rgba(19,81,180,0.3);
        }

        textarea{
        resize:none;
        }


        button{
        width:100%;
        padding:14px;
        background-color:#FFCD07;
        color:black;
        border:none;
        font-size:1.1rem;
        font-weight:600;
        cursor:pointer;
        border-radius:10px;
        transition:0.2s;
        text-transform:uppercase;
        }

        button:hover{
        background-color:#e6b800;
        }


        @media (max-width:768px){

        .container{
        flex-direction:column;
        }

        .info-section{
        border-right:none;
        border-bottom:4px solid #0B3A8A;
        }

        }

    </style>
</head>

<script>
    function trocarImagem() {
        const select = document.getElementById("especie");
        const imagem = document.getElementById("imagemPeixe");

        const especieTexto = select.options[select.selectedIndex].text.toLowerCase();

        const imagens = {
            "tilápia": "/imagens/tilapia.jpg",
            "tucunaré": "/imagens/tucunare.jpg",
            "piau": "/imagens/piau.jpg"
        };

        imagem.src = imagens[especieTexto] || "/imagens/default.png";
    }
</script>

<body>

<div class="container">

    <div class="info-section">

        <h1>Registro de Captura</h1>

        <div class="fish-icon">🐟</div>

        <div class="brand">
            <h2>DIÁRIO DO PESCADOR</h2>
        </div>

    </div>

    <div class="form-section">

        <h2 class="form-title">Registrar Nova Captura</h2>

        <form th:action="@{/capturas/salvar}" method="post">

            <input type="hidden" name="pescariaId" value="1"/>

            <label>Espécie do Peixe:</label>
            <select id="especie" name="especieId" required onchange="trocarImagem()">
                <option value="" disabled selected>Selecione uma espécie</option>

                <option th:each="esp : ${especies}"
                        th:value="${esp.id}"
                        th:text="${esp.nomeComum}">
                </option>
            </select>

            <!-- IMAGEM DO PEIXE -->
            <img id="imagemPeixe" src="/imagens/default.png"
                 style="width:100%; max-height:200px; object-fit:contain; margin-bottom:15px; border-radius:10px;">

            <label>Peso Total (kg):</label>
            <input type="number" name="pesoTotal" step="0.1" required/>

            <label>Tamanho Médio (cm):</label>
            <input type="number" name="tamanhoMedio" required/>

            <label>Quantidade:</label>
            <input type="number" name="quantidade" required/>

            <label>Local da Captura:</label>
            <input type="text" name="local" required/>

            <label>Data da Captura:</label>
            <input type="date" name="data" required th:value="${dataAtual}"/>

            <label>Hora da Captura:</label>
            <input type="time" name="hora" required/>

            <label>Método de Pesca:</label>
            <select name="metodo" required>
                <option value="rede">Rede</option>
                <option value="linha">Linha</option>
                <option value="vara">Vara</option>
                <option value="anzol">Anzol</option>
            </select>

            <label>Isca Utilizada:</label>
            <input type="text" name="isca" required/>

            <label>Peixe Solto:</label>
            <select name="soltura" required>
                <option value="true">Sim</option>
                <option value="false">Não</option>
            </select>

            <label>Observações:</label>
            <textarea name="observacoes"></textarea>

            <button type="submit">Salvar Captura</button>

        </form>

    </div>

</div>

</body>
</html>
