<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal da Pesca - Login/Cadastro</title>

    <style>
        *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: 'Inter', sans-serif;
        }

        body{
        background-color:#F4F8F6;
        display:flex;
        justify-content:center;
        align-items:center;
        min-height:100vh;
        padding:20px;
        }

        .container{
        display:flex;
        max-width:1000px;
        width:100%;
        background-color:#1351B4;
        border-radius:15px;
        }

        .welcome-section{
        flex:1;
        background-color:#1351B4;
        color:white;
        padding:40px;
        display:flex;
        flex-direction:column;
        justify-content:center;
        border-right:4px solid #083D77;
        border-radius:15px 0 0 15px;
        }

        .welcome-section h1{
        font-size:2.2rem;
        margin-bottom:20px;
        color:white;
        letter-spacing:1px;
        }

        .welcome-section p{
        font-size:1rem;
        line-height:1.6;
        margin-bottom:15px;
        }

        .form-section{
        flex:1;
        padding:40px;
        background-color:#0B3A8A;
        border-radius:0 15px 15px 0;
        }

        .tabs{
        display:flex;
        margin-bottom:30px;
        border-bottom:3px solid #2f5fb8;
        }

        .tab{
        padding:12px 25px;
        cursor:pointer;
        font-weight:600;
        color:#c9d8ff;
        background-color:#083D77;
        border:2px solid #2f5fb8;
        border-bottom:none;
        margin-right:5px;
        transition:all 0.3s;
        border-radius:8px 8px 0 0;
        }

        .tab.active{
        color:white;
        background-color:#0B3A8A;
        border:2px solid #2f5fb8;
        border-bottom:2px solid #0B3A8A;
        position:relative;
        top:3px;
        }

        .form{
        display:none;
        }

        .form.active{
        display:block;
        }

        .form-group{
        margin-bottom:25px;
        }

        .form-group label{
        display:block;
        margin-bottom:10px;
        font-weight:600;
        color:white;
        font-size:1.1rem;
        }

        .form-group input{
        width:100%;
        padding:14px;
        border:3px solid #2f5fb8;
        background-color:#083D77;
        color:white;
        font-size:1rem;
        transition:all 0.3s;
        border-radius:8px;
        }

        .form-group input:focus{
        border-color:#6fa3ff;
        outline:none;
        background-color:#0B3A8A;
        }

        .form-group input::placeholder{
        color:#9bb7ff;
        }

        /* BOTÃO AMARELO */

        .btn{
        width:100%;
        padding:14px;
        background-color:#FFCD07;
        color:black;
        border:none;
        font-size:1.1rem;
        font-weight:600;
        cursor:pointer;
        transition:all 0.3s;
        text-transform:uppercase;
        letter-spacing:1px;
        border-radius:10px;
        }

        .btn:hover{
        background-color:#e6b800;
        }

        .brand{
        text-align:center;
        margin-top:30px;
        padding-top:20px;
        border-top:2px solid #2f5fb8;
        }

        .brand h2{
        color:white;
        font-size:1.8rem;
        letter-spacing:2px;
        }

        @media (max-width:768px){

        .container{
        flex-direction:column;
        border-width:5px;
        }

        .welcome-section{
        padding:30px;
        border-right:none;
        border-bottom:4px solid #083D77;
        border-radius:15px 15px 0 0;
        }

        .form-section{
        padding:30px;
        border-radius:0 0 15px 15px;
        }

        .tabs{
        justify-content:center;
        }

        }

    </style>
</head>

<body>

<div class="container">

    <div class="welcome-section">
        <h1>Bem-vindo a Pesca</h1>
        <p>Venha Pescar e Preservar</p>

        <div class="brand">
            <h2>PORTAL DA PESCA</h2>
        </div>
    </div>

    <div class="form-section">

        <div class="form-container">

            <div class="tabs">
                <div class="tab active" onclick="showForm('login')">Login</div>
                <div class="tab" onclick="showForm('register')">Cadastro</div>
            </div>

            <form id="login-form" class="form active" th:action="@{/usuario/login}" method="post">

                <div class="form-group">
                    <label for="login-email">E-mail</label>
                    <input type="text" id="login-email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="login-password">Senha</label>
                    <input type="password" id="login-password" name="senha" required>
                </div>

                <button type="submit" class="btn">Entrar</button>

            </form>

            <form id="register-form" class="form" th:action="@{/usuario}" method="post">

                <div class="form-group">
                    <label for="register-name">Nome Completo</label>
                    <input type="text" id="register-name" name="nome" required>
                </div>

                <div class="form-group">
                    <label for="register-email">E-mail</label>
                    <input type="email" id="register-email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="register-password">Senha</label>
                    <input type="password" id="register-password" name="senha" required>
                </div>

                <button type="submit" class="btn">Criar Conta</button>

            </form>

        </div>
    </div>
</div>

<script>

    function showForm(formType){

    document.querySelectorAll('.form').forEach(form=>{
    form.classList.remove('active');
    });

    document.querySelectorAll('.tab').forEach(tab=>{
    tab.classList.remove('active');
    });

    document.getElementById(formType + '-form').classList.add('active');

    event.target.classList.add('active');

    }

</script>

</body>
</html>
