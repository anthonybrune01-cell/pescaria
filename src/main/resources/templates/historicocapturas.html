<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Histórico de Capturas</title>

    <style>
        body {
            margin: 0;
            background-color: #0f2a3d;
            font-family: "Segoe UI", sans-serif;
            color: #e3eef5;
        }

        .container {
            max-width: 1300px;
            margin: 40px auto;
            padding: 20px;
        }

        .title {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 25px;
            border-bottom: 2px solid #395b75;
            padding-bottom: 10px;
        }

        .card {
            background-color: #294861;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            border: 1px solid #3d6a85;
            position: relative;
        }

        .card h3 {
            margin: 0 0 8px 0;
            color: #ffffff;
            padding-right: 120px;
            box-sizing: border-box;
        }

        .info-line {
            margin: 4px 0;
            font-size: 15px;
        }

        .label {
            display: inline-block;
            padding: 3px 8px;
            background-color: #2c6f8e;
            border-radius: 5px;
            font-size: 12px;
            margin-right: 6px;
        }

        .release-tag {
            background-color: #7b3fa3;
        }

        .no-release {
            background-color: #b23f3f;
        }

        /* Estilos do Botão de Apagar */
        .delete-button {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 8px 15px;
            background-color: #d9534f;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background-color 0.3s ease;
        }

        .delete-button:hover {
            background-color: #c9302c;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="title">Histórico de Capturas</div>

    <div th:if="${capturas.isEmpty()}">
        <p>Nenhuma captura registrada.</p>
    </div>

    <div th:each="c : ${capturas}" class="card" th:id="'capture-' + ${c.id}">
        <button
                th:attr="onclick=|deleteCapture('${c.id}')|"
                class="delete-button"
        >
            Apagar Captura
        </button>

        <h3 th:text="${c.especie?.nome ?: 'Espécie Não Definida'}">
            Nome da espécie
        </h3>

        <div class="info-line">
            <span class="label">Quantidade</span>
            <span th:text="${c.quantidade}"></span>
        </div>

        <div class="info-line">
            <span class="label">Peso Total</span>
            <span th:text="${c.pesoTotal + ' kg'}"></span>
        </div>

        <div class="info-line">
            <span class="label">Tamanho Médio</span>
            <span th:text="${c.tamanhoMedio + ' cm'}"></span>
        </div>

        <div class="info-line">
            <span class="label">Local</span>
            <span th:text="${c.local}"></span>
        </div>

        <div class="info-line">
            <span class="label">Data</span>
            <span th:text="${c.data}"></span>

            <span class="label">Hora</span>
            <span th:text="${c.hora}"></span>
        </div>

        <div class="info-line">
            <span class="label">Método</span>
            <span th:text="${c.metodo}"></span>
        </div>

        <div class="info-line">
            <span class="label">Isca</span>
            <span th:text="${c.isca}"></span>
        </div>

        <div class="info-line">
            <span th:classappend="${c.soltura} ? 'release-tag' : 'no-release'"
                  class="label">
                <span th:text="${c.soltura ? 'Solto' : 'Retido'}"></span>
        </div>

        <div class="info-line" th:if="${c.observacoes != null and c.observacoes.trim() != ''}">
            <span class="label">Observações</span>
            <span th:text="${c.observacoes}"></span>
        </div>

    </div>

</div>

<script th:inline="javascript">
    /*<![CDATA[*/

    function deleteCapture(captureId) {
        if (!confirm("Tem certeza que deseja apagar a captura " + captureId + "? Esta ação é irreversível.")) {
            return; // Interrompe se o usuário cancelar
        }

        // Define o endpoint para a requisição DELETE
        const url = '/capturas/' + captureId;

        fetch(url, {
            method: 'DELETE' // Define o método como DELETE
        })
        .then(response => {
            // Verifica o status da resposta
            if (response.ok) {
                // A exclusão foi bem-sucedida (status 200-299)
                alert('Captura apagada com sucesso!');

                // Opcional: Remover o card da tela sem recarregar a página
                const card = document.getElementById('capture-' + captureId);
                if (card) {
                    card.remove();
                } else {
                    // Se a remoção falhar, recarrega a página para garantir a atualização
                    window.location.reload();
                }
            } else if (response.status === 404) {
                 alert('Erro: A captura não foi encontrada (404).');
            } else {
                // Outros erros do servidor
                alert('Erro ao apagar a captura. Status: ' + response.status);
            }
        })
        .catch(error => {
            // Erro de rede ou na requisição
            console.error('Erro na requisição DELETE:', error);
            alert('Erro de comunicação com o servidor.');
        });
    }

    /*]]>*/
</script>

</body>
</html>
